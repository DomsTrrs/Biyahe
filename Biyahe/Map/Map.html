<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Biyahe Map</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>

        const map = L.map('map').setView([10.3157, 123.8854], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let jeepMarker = null;
        let routeLine = null;
        let stopMarkers = [];

        function drawRoute(coords, routeName) {

        if (routeLine) {
        map.removeLayer(routeLine);
        }

        stopMarkers.forEach(marker => {
        map.removeLayer(marker);
        });

        stopMarkers = [];

        routeLine = L.polyline(coords, {
        color: '#2563EB',
        weight: 5,
        opacity: 0.8
        }).addTo(map);

        map.fitBounds(routeLine.getBounds(), {
        padding: [40, 40]
        });

        coords.forEach(coord => {

        const dot = L.circleMarker(coord, {
        radius: 7,
        fillColor: '#FFFFFF',
        color: '#2563EB',
        weight: 2,
        fillOpacity: 1
        }).addTo(map);

        stopMarkers.push(dot);
        });

        if (routeName) {
        routeLine.bindPopup(routeName);
        }
        }

        function updateJeepPosition(lat, lng, label) {

        const pos = [lat, lng];

        if (jeepMarker) {

        jeepMarker.setLatLng(pos);

        } else {

        jeepMarker = L.marker(pos, {
        title: label || 'Jeepney'
        }).addTo(map);
        }

        jeepMarker.bindPopup(label || 'Jeepney in Transit');
        }

    </script>

</body>
</html>
