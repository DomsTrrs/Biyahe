<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biyahe Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .leaflet-routing-container {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>

    <script>

        const map = new L.Map('map', {
        center: [10.3157, 123.8854],
        zoom: 14,
        zoomControl: false
        });

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
        maxZoom: 19
        }).addTo(map);

        let routingControl = null;
        let stopMarkers    = [];

        function drawRoute(coords, routeName) {

        if (routingControl) {
        map.removeControl(routingControl);
        routingControl = null;
        }

        stopMarkers.forEach(m => map.removeLayer(m));
        stopMarkers = [];

        const waypoints = coords.map(([lat, lng]) => L.latLng(lat, lng));

        routingControl = L.Routing.control({
        waypoints: waypoints,
        router: L.Routing.osrmv1({
        serviceUrl: 'https://router.project-osrm.org/route/v1'
        }),
        lineOptions: {
        styles: [{ color: '#2563EB', weight: 5, opacity: 0.85 }],
        extendToWaypoints: true,
        missingRouteTolerance: 0
        },
        show:                false,
        addWaypoints:        false,
        routeWhileDragging:  false,
        fitSelectedRoutes:   false,
        createMarker: function() { return null; }
        }).addTo(map);

        routingControl.on('routesfound', function(e) {
        const routeCoords = e.routes[0].coordinates;
        const bounds      = L.latLngBounds(routeCoords);
        const pullZoom    = Math.max(map.getZoom() - 1.5,
        map.getBoundsZoom(bounds, false) - 1.5, 11);

        map.flyTo(map.getCenter(), pullZoom, { animate: true, duration: 0.5 });

        setTimeout(() => {
        map.flyToBounds(bounds, {
        animate:            true,
        duration:           0.9,
        paddingTopLeft:     [60, 60],
        paddingBottomRight: [60, 60]
        });
        }, 520);

        // ── Draw a dot for EVERY stop including middle ones ──────────
        coords.forEach(function([lat, lng], index) {
        const isStart = index === 0;
        const isEnd   = index === coords.length - 1;
        const stopNum = index + 1;

        // green for start, red for end, blue for middle stops
        const fill = isStart ? '#22C55E'
        : isEnd   ? '#EF4444'
        :           '#2563EB';

        // start and end are slightly bigger
        const size = (isStart || isEnd) ? 16 : 13;

        const icon = L.divIcon({
        html:       makeDot(fill, 'white', size + 'px'),
        className:  '',
        iconSize:   [size, size],
        iconAnchor: [size / 2, size / 2]
        });

        const marker = L.marker([lat, lng], { icon });

        // popup label for each stop
        if (isStart) {
        marker.bindPopup(
        '<b>Stop 1 — Start</b>' +
        (routeName ? '<br>' + routeName : '')
        );
        } else if (isEnd) {
        marker.bindPopup(
        '<b>Stop ' + stopNum + ' — End</b>' +
        (routeName ? '<br>' + routeName : '')
        );
        } else {
        marker.bindPopup('<b>Stop ' + stopNum + '</b>');
        }

        marker.addTo(map);
        stopMarkers.push(marker);
        });
        // ─────────────────────────────────────────────────────────────

        // auto-open the start popup
        if (stopMarkers.length > 0) stopMarkers[0].openPopup();
        });

        routingControl.on('routingerror', function(e) {
        console.warn('Routing error:', e.error);
        });
        }

        function makeDot(fill, stroke, size = '16px') {
        return `<div style="
        background:    ${fill};
        width:         ${size};
        height:        ${size};
        border-radius: 50%;
        border:        3px solid ${stroke || 'white'};
        box-shadow:    0 0 6px rgba(0,0,0,0.4);
        cursor:        pointer;
        "></div>`;
        }

        // ── jeepney marker (called from C# via ExecuteScriptAsync) ──────────
        let jeepMarker = null;

        function updateJeepPosition(lat, lng, label) {
        const pos = [lat, lng];
        if (jeepMarker) {
        jeepMarker.setLatLng(pos);
        } else {
        jeepMarker = L.marker(pos, { title: label || 'Jeepney' }).addTo(map);
        }
        jeepMarker.bindPopup(label || 'Jeepney in Transit');
        }

    </script>
</body>
</html>
