<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biyahe Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>

        // =========================
        // Initialize Map
        // =========================
        const map = L.map('map').setView([10.3157, 123.8854], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // =========================
        // Global Variables
        // =========================
        let jeepMarker = null;
        let routeLine  = null;
        let stopMarkers = [];

        // =========================
        // Custom Icons
        // =========================
        const startIcon = L.divIcon({
        className: '',
        html: `<div style="
        background:#22C55E;
        width:16px; height:16px;
        border-radius:50%;
        border:3px solid white;
        box-shadow:0 0 4px rgba(0,0,0,0.4)">
        </div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8]
        });

        const endIcon = L.divIcon({
        className: '',
        html: `<div style="
        background:#EF4444;
        width:16px; height:16px;
        border-radius:50%;
        border:3px solid white;
        box-shadow:0 0 4px rgba(0,0,0,0.4)">
        </div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8]
        });

        const jeepIcon = L.divIcon({
        className: '',
        html: `<div style="
        background:#F59E0B;
        width:18px; height:18px;
        border-radius:50%;
        border:3px solid white;
        box-shadow:0 0 6px rgba(0,0,0,0.5)">
        </div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9]
        });

        // =========================
        // Draw Route
        // Called from C#:
        // drawRoute([[10.31,123.88],[10.32,123.89]], "Route 01");
        // =========================
        function drawRoute(coords, routeName) {

        // Remove old route line
        if (routeLine) {
        map.removeLayer(routeLine);
        }

        // Remove old stop markers
        stopMarkers.forEach(m => map.removeLayer(m));
        stopMarkers = [];

        // Draw polyline
        routeLine = L.polyline(coords, {
        color: '#2563EB',
        weight: 5,
        opacity: 0.8
        }).addTo(map);

        // Fit map to route
        map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });

        // Draw markers per stop
        coords.forEach((coord, index) => {
        let marker;

        if (index === 0) {
        // Start pin (green)
        marker = L.marker(coord, { icon: startIcon })
        .addTo(map)
        .bindPopup("Start: " + (routeName || ""));

        } else if (index === coords.length - 1) {
        // End pin (red)
        marker = L.marker(coord, { icon: endIcon })
        .addTo(map)
        .bindPopup("End: " + (routeName || ""));

        } else {
        // Middle stops (blue dots)
        marker = L.circleMarker(coord, {
        radius: 7,
        fillColor: '#FFFFFF',
        color: '#2563EB',
        weight: 2,
        fillOpacity: 1
        }).addTo(map);
        }

        stopMarkers.push(marker);
        });

        // Route name popup on polyline
        if (routeName) {
        routeLine.bindPopup(routeName);
        }
        }

        // =========================
        // Update Jeep Position
        // Called from C#:
        // updateJeepPosition(10.3157, 123.8854, "Jeepney 01");
        // =========================
        function updateJeepPosition(lat, lng, label) {
        const pos = [lat, lng];

        if (jeepMarker) {
        jeepMarker.setLatLng(pos);
        } else {
        jeepMarker = L.marker(pos, { icon: jeepIcon }).addTo(map);
        }

        jeepMarker.bindPopup(label || 'Jeepney in Transit');
        }

    </script>
</body>
</html>
