<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biyahe Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .leaflet-routing-container {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>

    <script>
        const map = new L.Map('map', {
        center: [10.3157, 123.8854],
        zoom: 14,
        zoomControl: false
        });

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
        }).addTo(map);

        let routingControl = null;
        let stopMarkers = [];
        let placeholderLine = null;

        let selfMarker = null;
        let selfAccuracyCircle = null;
        let locationWatchId = null;

        let driverMarkers = {};
        let userMarkers = {};

        function convertToLatLng(coord) {
        return L.latLng(coord[0], coord[1]);
        }

        function removeMarker(marker) {
        map.removeLayer(marker);
        }

        function makeDot(fill, stroke, size) {
        if (!size) {
        size = '16px';
        }

        return `
        <div style="
        background:${fill};
        width:${size};
        height:${size};
        border-radius:50%;
        border:3px solid ${stroke || 'white'};
        box-shadow:0 0 6px rgba(0,0,0,0.4);
        cursor:pointer;
        "></div>
        `;
        }

        function makeIcon(fill, size) {
        const iconSize = size || 18;

        return L.divIcon({
        html: makeDot(fill, 'white', iconSize + 'px'),
        className: '',
        iconSize: [iconSize, iconSize],
        iconAnchor: [iconSize / 2, iconSize / 2]
        });
        }

        function drawRoute(coords, routeName) {
        if (routingControl) {
        map.removeControl(routingControl);
        routingControl = null;
        }

        if (placeholderLine) {
        map.removeLayer(placeholderLine);
        placeholderLine = null;
        }

        stopMarkers.forEach(removeMarker);
        stopMarkers = [];

        const latLngs = coords.map(convertToLatLng);

        placeholderLine = L.polyline(latLngs, {
        color: '#2563EB',
        weight: 5,
        opacity: 0.35,
        dashArray: '8, 6'
        }).addTo(map);

        map.fitBounds(L.latLngBounds(latLngs), {
        paddingTopLeft: [60, 60],
        paddingBottomRight: [60, 60],
        animate: true,
        duration: 0.5
        });

        coords.forEach(function (coord, index) {
        const isStart = index === 0;
        const isEnd = index === coords.length - 1;
        const stopNum = index + 1;

        const fill =
        isStart ? '#22C55E'
        : isEnd ? '#EF4444'
        : '#2563EB';

        const size = (isStart || isEnd) ? 16 : 13;

        const marker = L.marker([coord[0], coord[1]], {
        icon: makeIcon(fill, size)
        });

        if (isStart) {
        marker.bindPopup(
        '<b>Stop 1 - Start</b>' +
        (routeName ? '<br>' + routeName : '')
        );
        } else if (isEnd) {
        marker.bindPopup(
        '<b>Stop ' + stopNum + ' - End</b>' +
        (routeName ? '<br>' + routeName : '')
        );
        } else {
        marker.bindPopup('<b>Stop ' + stopNum + '</b>');
        }

        marker.addTo(map);
        stopMarkers.push(marker);
        });

        if (stopMarkers.length > 0) {
        stopMarkers[0].openPopup();
        }

        routingControl = L.Routing.control({
        waypoints: latLngs,

        router: L.Routing.osrmv1({
        serviceUrl: 'https://router.project-osrm.org/route/v1'
        }),

        lineOptions: {
        styles: [{
        color: '#2563EB',
        weight: 5,
        opacity: 0.85
        }],
        extendToWaypoints: true,
        missingRouteTolerance: 0
        },

        show: false,
        addWaypoints: false,
        routeWhileDragging: false,
        fitSelectedRoutes: false,

        createMarker: function () {
        return null;
        }
        }).addTo(map);

        routingControl.on('routesfound', function () {
        if (placeholderLine) {
        map.removeLayer(placeholderLine);
        placeholderLine = null;
        }
        });

        routingControl.on('routingerror', function (e) {
        console.warn('Routing error:', e.error);
        });
        }

        function startLocationWatch(role) {
        if (!navigator.geolocation) {
        alert("Geolocation is not supported by your browser.");
        return;
        }

        if (locationWatchId !== null) {
        navigator.geolocation.clearWatch(locationWatchId);
        }

        locationWatchId = navigator.geolocation.watchPosition(
        function (pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const accuracy = pos.coords.accuracy || 50;

        showSelfLocation(lat, lng, accuracy, role);
        sendLocationToCSharp(lat, lng, accuracy, role);
        },
        function (err) {
        console.error("Geolocation error:", err.message);

        if (err.code === err.PERMISSION_DENIED) {
        alert("Please allow location access so Biyahe can show your current location.");
        }
        },
        {
        enableHighAccuracy: true,
        maximumAge: 5000,
        timeout: 10000
        }
        );
        }

        function stopLocationWatch() {
        if (locationWatchId !== null) {
        navigator.geolocation.clearWatch(locationWatchId);
        locationWatchId = null;
        }
        }

        function showSelfLocation(lat, lng, accuracy, role) {
        const pos = [lat, lng];
        const isDriver = role === 'driver';

        if (selfMarker) {
        selfMarker.setLatLng(pos);
        } else {
        selfMarker = L.marker(pos, {
        icon: makeIcon(isDriver ? '#F97316' : '#0EA5E9', 20)
        }).addTo(map);
        }

        selfMarker.bindPopup(isDriver ? 'Your driver location' : 'You are here');

        if (selfAccuracyCircle) {
        selfAccuracyCircle.setLatLng(pos);
        selfAccuracyCircle.setRadius(accuracy);
        } else {
        selfAccuracyCircle = L.circle(pos, {
        radius: accuracy,
        color: isDriver ? '#F97316' : '#0EA5E9',
        fillColor: isDriver ? '#F97316' : '#0EA5E9',
        fillOpacity: 0.12,
        weight: 1
        }).addTo(map);
        }
        }

        function sendLocationToCSharp(lat, lng, accuracy, role) {
        if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage({
        type: 'locationChanged',
        role: role,
        lat: lat,
        lng: lng,
        accuracy: accuracy
        });
        }
        }

        function showDriverLocations(drivers) {
        const activeKeys = {};

        drivers.forEach(function (driver) {
        const id = driver.id || driver.Id || driver.DriverID || driver.driverID;
        const lat = driver.lat || driver.Lat || driver.Latitude;
        const lng = driver.lng || driver.Lng || driver.Longitude;
        const label = driver.label || driver.Label || driver.PlateNumber || 'Driver';

        if (!id || lat == null || lng == null) {
        return;
        }

        const key = 'driver-' + id;
        activeKeys[key] = true;

        const pos = [lat, lng];

        if (driverMarkers[key]) {
        driverMarkers[key].setLatLng(pos);
        } else {
        driverMarkers[key] = L.marker(pos, {
        icon: makeIcon('#F97316', 18),
        title: label
        }).addTo(map);
        }

        driverMarkers[key].bindPopup('<b>Driver</b><br>' + label);
        });

        removeMissingMarkers(driverMarkers, activeKeys);
        }

        function showUserLocations(users) {
        const activeKeys = {};

        users.forEach(function (user) {
        const id = user.id || user.Id || user.UserID || user.userID;
        const lat = user.lat || user.Lat || user.Latitude;
        const lng = user.lng || user.Lng || user.Longitude;
        const label = user.label || user.Label || user.FirstName || 'Passenger';

        if (!id || lat == null || lng == null) {
        return;
        }

        const key = 'user-' + id;
        activeKeys[key] = true;

        const pos = [lat, lng];

        if (userMarkers[key]) {
        userMarkers[key].setLatLng(pos);
        } else {
        userMarkers[key] = L.marker(pos, {
        icon: makeIcon('#A855F7', 18),
        title: label
        }).addTo(map);
        }

        userMarkers[key].bindPopup('<b>Passenger</b><br>' + label);
        });

        removeMissingMarkers(userMarkers, activeKeys);
        }

        function removeMissingMarkers(markerGroup, activeKeys) {
        Object.keys(markerGroup).forEach(function (key) {
        if (!activeKeys[key]) {
        map.removeLayer(markerGroup[key]);
        delete markerGroup[key];
        }
        });
        }

        function clearDriverLocations() {
        Object.keys(driverMarkers).forEach(function (key) {
        map.removeLayer(driverMarkers[key]);
        });

        driverMarkers = {};
        }

        function clearUserLocations() {
        Object.keys(userMarkers).forEach(function (key) {
        map.removeLayer(userMarkers[key]);
        });

        userMarkers = {};
        }

        function centerOnSelf() {
        if (selfMarker) {
        map.setView(selfMarker.getLatLng(), 16);
        }
        }

        function updateJeepPosition(lat, lng, label) {
        showDriverLocations([{
        id: 'single-jeep',
        lat: lat,
        lng: lng,
        label: label || 'Jeepney in Transit'
        }]);
        }
    </script>
</body>
</html>
