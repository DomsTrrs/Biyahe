<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biyahe Map</title>

    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

    <script>

        const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
        center: [123.8854, 10.3157],
        zoom: 14,
        pitch: 45,
        bearing: -10,
        antialias: true
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-left');

        map.on('load', () => {
        map.addSource('openmaptiles', {
        type: 'vector',
        url: 'https://tiles.openfreemap.org/planet'
        });

        map.addLayer({
        id: '3d-buildings',
        source: 'openmaptiles',
        'source-layer': 'building',
        type: 'fill-extrusion',
        minzoom: 14,
        paint: {
        'fill-extrusion-color': '#a1a1aa',
        'fill-extrusion-height': ['coalesce', ['get', 'render_height'], ['get', 'height'], 4],
        'fill-extrusion-base': ['coalesce', ['get', 'render_min_height'], ['get', 'min_height'], 0],
        'fill-extrusion-opacity': 0.75
        }
        });
        });

        let jeepMarker  = null;
        let routeLine   = null;
        let stopMarkers = [];

        function drawRoute(coords, routeName) {

        if (routeLine) {
        if (map.getLayer('route-line'))    map.removeLayer('route-line');
        if (map.getSource('route-source')) map.removeSource('route-source');
        routeLine = null;
        }

        stopMarkers.forEach(m => m.remove());
        stopMarkers = [];

        const lngLatCoords = coords.map(([lat, lng]) => [lng, lat]);

        map.addSource('route-source', {
        type: 'geojson',
        data: {
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: lngLatCoords }
        }
        });

        map.addLayer({
        id: 'route-line',
        type: 'line',
        source: 'route-source',
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: {
        'line-color': '#2563EB',
        'line-width': 5,
        'line-opacity': 0.85
        }
        });

        routeLine = true;

        const bounds = lngLatCoords.reduce(
        (b, c) => b.extend(c),
        new maplibregl.LngLatBounds(lngLatCoords[0], lngLatCoords[0])
        );
        map.fitBounds(bounds, { padding: 60 });

        coords.forEach(([lat, lng], index) => {
        const el = document.createElement('div');

        if (index === 0) {
        el.innerHTML = makeDot('#22C55E');
        const m = new maplibregl.Marker({ element: el })
        .setLngLat([lng, lat])
        .setPopup(new maplibregl.Popup().setText('Start: ' + (routeName || '')))
        .addTo(map);
        stopMarkers.push(m);

        } else if (index === coords.length - 1) {
        el.innerHTML = makeDot('#EF4444');
        const m = new maplibregl.Marker({ element: el })
        .setLngLat([lng, lat])
        .setPopup(new maplibregl.Popup().setText('End: ' + (routeName || '')))
        .addTo(map);
        stopMarkers.push(m);

        } else {
        el.innerHTML = makeDot('#FFFFFF', '#2563EB', '14px');
        const m = new maplibregl.Marker({ element: el })
        .setLngLat([lng, lat])
        .addTo(map);
        stopMarkers.push(m);
        }
        });
        }

        function updateJeepPosition(lat, lng, label) {
        if (jeepMarker) {
        jeepMarker.setLngLat([lng, lat]);
        jeepMarker.getPopup().setText(label || 'Jeepney in Transit');
        } else {
        const el = document.createElement('div');
        el.innerHTML = makeDot('#F59E0B', 'white', '18px');
        jeepMarker = new maplibregl.Marker({ element: el })
        .setLngLat([lng, lat])
        .setPopup(new maplibregl.Popup().setText(label || 'Jeepney in Transit'))
        .addTo(map);
        }
        }

        function makeDot(fill, stroke, size = '16px') {
        return `<div style="
        background: ${fill};
        width: ${size};
        height: ${size};
        border-radius: 50%;
        border: 3px solid ${stroke || 'white'};
        box-shadow: 0 0 6px rgba(0,0,0,0.4);
        cursor: pointer;
        "></div>`;
        }

    </script>

</body>
</html>
